name: Build and Release Hev Socks5 Tunnel

on:
  push:
    tags:
      - 'v*' # Memicu rilis otomatis saat kamu push tag versi baru
  workflow_dispatch: 

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- TARGET ANDROID (.SO SHARED LIBRARY) ---
          - os: ubuntu-latest
            target: android-arm64
            is_android: true
            arch_target: aarch64-linux-android24
          - os: ubuntu-latest
            target: android-arm32
            is_android: true
            arch_target: armv7a-linux-androideabi24

          # --- TARGET LINUX (BINARY) ---
          - os: ubuntu-latest
            target: linux-amd64
            cc: gcc
          - os: ubuntu-latest
            target: linux-386
            cc: gcc -m32
            pkg: gcc-multilib
          - os: ubuntu-latest
            target: linux-arm32
            cc: arm-linux-gnueabi-gcc
            pkg: gcc-arm-linux-gnueabi
          - os: ubuntu-latest
            target: linux-arm32hf
            cc: arm-linux-gnueabihf-gcc
            pkg: gcc-arm-linux-gnueabihf
          - os: ubuntu-latest
            target: linux-arm64
            cc: aarch64-linux-gnu-gcc
            pkg: gcc-aarch64-linux-gnu

          # --- TARGET MAC O/S (BINARY) ---
          - os: macos-latest
            target: darwin-x86_64
            cc: clang -target x86_64-apple-macos10.12
          - os: macos-latest
            target: darwin-arm64
            cc: clang -target arm64-apple-macos11.0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Submodules
        run: |
          git submodule update --init --recursive

      - name: Install Cross-Compilers (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.pkg != '' && matrix.is_android != true
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }}

      # Proses Kompilasi Pintar (Memisahkan .so Android dan Binary Biasa)
      - name: Compile Binary
        run: |
          mkdir -p output_dist
          
          if [ "${{ matrix.is_android }}" = "true" ]; then
            # Ambil compiler dari Android NDK bawaan GitHub runner
            NDK_BIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
            export CC="$NDK_BIN/${{ matrix.arch_target }}-clang"
            
            echo "🔧 Compiling Android Shared Library (.so) menggunakan NDK..."
            # Paksa flags -shared dan -fPIC agar melahirkan file .so
            make CC="$CC" CFLAGS="-fPIC" LDFLAGS="-shared"
            
            # Cari filenya dan bungkus menjadi nama libhev-socks5-tunnel.so
            if [ -f "bin/hev-socks5-tunnel" ]; then
              mv bin/hev-socks5-tunnel output_dist/libhev-socks5-tunnel-${{ matrix.target }}.so
            elif [ -f "bin/main" ]; then
              mv bin/main output_dist/libhev-socks5-tunnel-${{ matrix.target }}.so
            else
              mv hev-socks5-tunnel output_dist/libhev-socks5-tunnel-${{ matrix.target }}.so || true
            fi
          else
            # Proses normal untuk Linux & Mac desktop
            export CC="${{ matrix.cc }}"
            make CC="$CC"
            
            if [ -f "bin/hev-socks5-tunnel" ]; then
              mv bin/hev-socks5-tunnel output_dist/hev-socks5-tunnel-${{ matrix.target }}
            elif [ -f "bin/main" ]; then
              mv bin/main output_dist/hev-socks5-tunnel-${{ matrix.target }}
            else
              mv hev-socks5-tunnel output_dist/hev-socks5-tunnel-${{ matrix.target }} || true
            fi
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: output_dist/*

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate Release Page
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## Hev Socks5 Tunnel Official Release `${{ github.ref_name }}`
            ✓ Target Android berhasil di-compile menjadi file **`.so` (Shared Library)**!
            ✓ Target Desktop (Linux/macOS) berhasil dirakit menjadi file binari eksekutan.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
