# Main configuration for hev-socks5-tunnel

tunnel:
  # Interface name
  name: tun0
  # Interface MTU
  mtu: 8500
  # Multi-queue (Dibuat true biar kerja CPU HP lebih enteng membagi beban)
  multi-queue: true
  # IPv4 address
  ipv4: 198.18.0.1
  # IPv6 address
  ipv6: 'fc00::1'

# ==========================================
# DNS Upstream Anti-Iklan (AdGuard DNS)
# ==========================================
dns:
  # DNS server port
  port: 53
  # DNS server address (IPv4)
  address: 94.140.14.14

socks5:
  # Socks5 server port
  port: 1080
  # Socks5 server address (ipv4/ipv6)
  address: 127.0.0.1
  # Socks5 UDP relay mode (Wajib 'udp' untuk mengaktifkan jalur UDP)
  udp: 'udp'

misc:
  # task stack size (bytes)
  task-stack-size: 86016
  # tcp buffer size (bytes)
  tcp-buffer-size: 65536
  # udp socket recv buffer size (Dibuka biar buffer data UDP lebih luas & gak lag)
  udp-recv-buffer-size: 524288
  # number of udp buffers in splice (Diaktifkan untuk mempercepat aliran data UDP)
  udp-copy-buffer-nums: 10
  # maximum session count (0: unlimited)
  max-session-count: 0
  # connect timeout (ms)
  connect-timeout: 10000
  # TCP read-write timeout (ms)
  tcp-read-write-timeout: 300000
  # UDP read-write timeout (Diaktifkan biar sesi UDP tidak gampang mati/DC)
  udp-read-write-timeout: 60000
  # stdout, stderr or file-path
  log-file: stderr
  # debug, info, warn or error
  log-level: warn
